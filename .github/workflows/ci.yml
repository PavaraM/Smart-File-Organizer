name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: style
          scandir: .
          additional_files: install.sh fixfolder.sh

  test:
    name: BATS – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
      - name: Install BATS
        run: |
          npm install -g bats
      - name: Run tests
        run: bats tests/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t smart-file-organizer .
      - name: Test Docker image
        run: |
          mkdir -p /tmp/sfo-test
          touch /tmp/sfo-test/test.txt
          docker run --rm -v /tmp/sfo-test:/data smart-file-organizer /data
          [ -d /tmp/sfo-test/Documents ]
